# =====================================================================
# nginx config for AlgoFlow (algoflowev4) — HTTP, works immediately
# =====================================================================
# This is the DEFAULT config. It runs on plain HTTP (port 80), works
# on `localhost` right away with NO domain and NO SSL certificate
# needed — exactly what you want for local testing / first run.
#
# Once you have a real domain pointed at your server and want HTTPS,
# switch to `algoflow-ssl.conf.example` (see DEPLOYMENT.md "Going to
# HTTPS" section) — that one requires a Certbot certificate to exist
# BEFORE nginx can start, which is why it's not the default.
#
# WHAT THIS FILE DOES, IN PLAIN TERMS:
#
# Your app already does multi-vendor (multi-company) the RIGHT way:
# ONE Django backend + ONE database, and each company is just a row
# in the `Company` table. A request is routed to the right company
# primarily by SUBDOMAIN (e.g. aalu.localhost:3000), with slug/query
# param/JWT company_id as fallbacks — see
# Company.resolve_from_request() in backend/company/models.py. This
# nginx config (server_name _;) matches every hostname/subdomain the
# same way, so it doesn't need to know companies exist at all -
# Django's TenantMiddleware handles that.
#
# So nginx's job here is simple and standard:
#   1. Be the thing listening on port 80 (and later 443 for HTTPS).
#   2. Serve /static/ and /media/ files directly from disk (fast,
#      no need to round-trip through Node or Django for static files).
#   3. Proxy /api/ and /django-admin/ to Django (gunicorn, port 8001
#      inside the docker network).
#   4. Proxy everything else to the Node server (port 3000 inside the
#      docker network), which serves your built React `dist/` files.
# =====================================================================

# ---------------------------------------------------------------------
# Upstream definitions (the containers nginx forwards requests to)
# ---------------------------------------------------------------------
upstream node_app {
    # "app" = the service name of your existing Dockerfile container
    # in docker-compose.yml. Node/Express listens on 3000 inside it.
    server app:3000;
}

upstream django_app {
    # Same container, but talking directly to gunicorn on 8001.
    # We bypass the Node proxy for /api and /django-admin so nginx
    # talks straight to Django — one less hop, easier to debug.
    server app:8001;
}

# ---------------------------------------------------------------------
# Rate limiting zone — protects login/auth endpoints from brute force.
# 10MB zone tracks ~160,000 unique IPs; 5 requests/sec per IP allowed.
# ---------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/s;

server {
    listen 80;
    listen [::]:80;
    # "_" matches ANY hostname (localhost, your server IP, or a real
    # domain later) — no domain required to get this running.
    server_name _;

    client_max_body_size 25M;  # allow product image uploads etc.

    # ---- Security headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Let Certbot's HTTP-01 challenge through later, when you add a
    # real domain + SSL. Harmless to leave in now.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # =================================================================
    # 1. Django static files (CSS/JS for django-admin, jazzmin theme)
    #    Matches settings.py: STATIC_ROOT = BASE_DIR / "staticfiles"
    #    Populated by running: python manage.py collectstatic
    # =================================================================
    location /static/ {
        alias /app/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # =================================================================
    # 2. Media files (product images, uploaded by company admins)
    #    Matches settings.py: MEDIA_ROOT = BASE_DIR / "media"
    # =================================================================
    location /media/ {
        alias /app/backend/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # =================================================================
    # 3. Django REST API  ->  gunicorn directly on :8001
    #    Matches fixitall_backend/urls.py: path('api/...')
    # =================================================================
    location /api/ {
        # Tighter rate limit specifically on auth endpoints to slow
        # down brute-force login/register attempts.
        location ~ ^/api/account/(login|register)/ {
            limit_req zone=login_limit burst=10 nodelay;
            proxy_pass http://django_app;
            include /etc/nginx/proxy_params.conf;
        }

        proxy_pass http://django_app;
        include /etc/nginx/proxy_params.conf;
    }

    # =================================================================
    # 4. Django admin panel
    #    Matches fixitall_backend/urls.py: path('django-admin/', ...)
    # =================================================================
    location /django-admin/ {
        proxy_pass http://django_app;
        include /etc/nginx/proxy_params.conf;
    }

    # =================================================================
    # 5. Everything else (the React SPA) -> Node server on :3000
    #    Node serves the Vite-built `dist/` folder and handles
    #    React Router client-side routing (incl. /store/{slug}/...)
    # =================================================================
    location / {
        proxy_pass http://node_app;
        include /etc/nginx/proxy_params.conf;

        # WebSocket support (kept here in case chatapp adds
        # websocket/SSE features later; harmless if unused now)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
