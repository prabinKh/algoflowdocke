# =====================================================================
# proxy_params.conf
# Shared headers for every proxied request. Included via:
#   include /etc/nginx/proxy_params.conf;
#
# WHAT EACH LINE DOES:
#   Host              -> passes the real domain the browser asked for,
#                         INCLUDING company subdomains like
#                         aalu.yourdomain.com (so Django's ALLOWED_HOSTS
#                         check and Company.resolve_from_request's
#                         subdomain detection both work)
#   X-Forwarded-Host  -> same value as Host, sent explicitly because
#                         Company.resolve_from_request() checks this
#                         header FIRST, before falling back to Host
#   X-Real-IP         -> passes the visitor's real IP to Django
#                         (otherwise Django would see nginx's IP,
#                          which breaks rate-limiting / logging)
#   X-Forwarded-For   -> standard proxy chain header (some libs use this
#                         instead of X-Real-IP)
#   X-Forwarded-Proto -> tells Django the original request was HTTPS
#                         even though nginx talks to Django over plain
#                         HTTP internally. Required because settings.py
#                         has: SECURE_PROXY_SSL_HEADER =
#                         ("HTTP_X_FORWARDED_PROTO", "https")
#                         Without this header, Django thinks every
#                         request is insecure HTTP and CSRF/cookie
#                         security checks misbehave.
# =====================================================================
proxy_set_header Host $host;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_connect_timeout 60s;
proxy_send_timeout 60s;
proxy_read_timeout 60s;
